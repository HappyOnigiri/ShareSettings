name: "Release Reminder"
description: "PRに前回リリース以降のマージ済みPR数をコメント"

inputs:
  threshold:
    description: "リリース推奨のPR件数閾値"
    required: false
    default: "10"
  github-token:
    description: "pull-requests:write 権限のあるトークン"
    required: true

runs:
  using: "composite"
  steps:
    - name: Check and comment
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        EVENT_ACTION: ${{ github.event.action }}
        THRESHOLD: ${{ inputs.threshold }}
      run: |
        MARKER="<!-- release-reminder-bot -->"

        LAST_TAG=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName 2>/dev/null || echo "")
        if [ -z "$LAST_TAG" ]; then
          echo "No previous release found, skipping"
          exit 0
        fi

        LAST_DATE=$(gh release view --repo "$GITHUB_REPOSITORY" --json publishedAt -q .publishedAt)
        PR_JSON=$(gh pr list --repo "$GITHUB_REPOSITORY" --state merged --base main \
          --search "merged:>=${LAST_DATE}" --json number,title)
        COUNT=$(echo "$PR_JSON" | jq 'length')
        PR_LIST=$(echo "$PR_JSON" | jq -r \
          --arg repo "$GITHUB_REPOSITORY" \
          '.[] | "- [#\(.number)](https://github.com/\($repo)/pull/\(.number)) \(.title)"')

        BODY="$MARKER"
        if [ "$COUNT" -eq 0 ]; then
          BODY+=$'\n'"**Release Reminder**: 前回リリース \`${LAST_TAG}\` 以降にマージされた PR はありません。"
        else
          BODY+=$'\n'"**Release Reminder**: 前回リリース \`${LAST_TAG}\` から **${COUNT} 件**の PR がマージされています。"
          if [ "$COUNT" -ge "$THRESHOLD" ]; then
            BODY+=$'\nリリースを検討してください。'
          fi
          BODY+=$'\n\n<details><summary>マージ済み PR 一覧</summary>\n\n'
          BODY+="$PR_LIST"
          BODY+=$'\n\n</details>'
        fi

        # synchronize の場合は既存コメントを更新
        if [ "$EVENT_ACTION" = "synchronize" ]; then
          COMMENT_ID=$(gh api \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" \
            | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api --method PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}" \
              -f body="$BODY"
            echo "Updated existing comment $COMMENT_ID"
            exit 0
          fi
          echo "No existing comment found, creating new one"
        fi

        gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$BODY"
