name: "Prepare Release"
description: "リリースブランチを作成してPRを開く共通 Composite Action"

inputs:
  version:
    description: "semver バージョン (e.g. 1.3.0)"
    required: true
  version-bump-type:
    description: "バージョンバンプ方法: npm / python / pyproject / none"
    default: "none"
  python-version-file:
    description: "Python バージョンファイルパス"
    default: "src/__version__.py"
  pyproject-path:
    description: "Path to pyproject.toml (only used when version-bump-type=pyproject)"
    required: false
    default: "pyproject.toml"
  post-bump-command:
    description: "Shell command to run after bump, before commit (e.g. 'make ci'). Designed for pyproject type; skipped when empty."
    required: false
    default: ""
  extra-paths-to-commit:
    description: "Whitespace/newline-separated additional paths to include in the bump commit. Designed for pyproject type; skipped when empty."
    required: false
    default: ""
  github-token:
    description: "contents:write + pull-requests:write 権限の PAT"
    required: true

runs:
  using: "composite"
  steps:
    - name: Validate version format
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        if ! echo "$VERSION" | grep -qE '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'; then
          echo "::error::Version must be in semver format (e.g. 1.3.0)"
          exit 1
        fi

    - uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0
        token: ${{ inputs.github-token }}

    - name: Check tag does not already exist
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        if git rev-parse -q --verify "refs/tags/v${VERSION}" >/dev/null 2>&1; then
          echo "::error::Tag v${VERSION} already exists"
          exit 1
        fi

    - name: Create release branch
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        git checkout -b "release/v${VERSION}"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Validate version-bump-type
      shell: bash
      env:
        BUMP_TYPE: ${{ inputs.version-bump-type }}
      run: |
        case "$BUMP_TYPE" in
          npm|python|pyproject|none) ;;
          *) echo "::error::version-bump-type must be npm, python, pyproject, or none (got: ${BUMP_TYPE})"; exit 1 ;;
        esac

    - name: Version bump (npm)
      if: inputs.version-bump-type == 'npm'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        npm version "$VERSION" --no-git-tag-version
        git add package.json
        if [ -f package-lock.json ]; then git add package-lock.json; fi
        git commit -m "release: v${VERSION}"

    - name: Version bump (python)
      if: inputs.version-bump-type == 'python'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        VERSION_FILE: ${{ inputs.python-version-file }}
      run: |
        if [ ! -f "$VERSION_FILE" ]; then
          echo "::error::${VERSION_FILE} not found"
          exit 1
        fi
        sed -i "s/__version__ = \".*\"/__version__ = \"${VERSION}\"/" "$VERSION_FILE"
        if ! grep -q "__version__ = \"${VERSION}\"" "$VERSION_FILE"; then
          echo "::error::Failed to update version in ${VERSION_FILE}"
          exit 1
        fi
        git add "$VERSION_FILE"
        git commit -m "release: v${VERSION}"

    - name: Version bump (pyproject)
      if: inputs.version-bump-type == 'pyproject'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        PYPROJECT_PATH: ${{ inputs.pyproject-path }}
      run: |
        if [ ! -f "$PYPROJECT_PATH" ]; then
          echo "::error::${PYPROJECT_PATH} not found"
          exit 1
        fi
        # Replace only top-level `version = "..."` lines (^version = ) to avoid
        # touching dependency version specifiers inside the file.
        sed -i -E 's/^version = "[^"]+"/version = "'"${VERSION}"'"/' "$PYPROJECT_PATH"
        if ! grep -q "^version = \"${VERSION}\"" "$PYPROJECT_PATH"; then
          echo "::error::Failed to update version in ${PYPROJECT_PATH}"
          exit 1
        fi
        git add "$PYPROJECT_PATH"

    - name: Post-bump command
      # Designed for pyproject type: runs a shell command after the bump but before
      # the commit, e.g. to rebuild artifacts. Skipped when post-bump-command is empty.
      # Security note: post-bump-command is expanded via bash -c. Only trusted
      # callers (internal workflows) should pass this input.
      if: inputs.version-bump-type == 'pyproject' && inputs.post-bump-command != ''
      shell: bash
      env:
        POST_BUMP_COMMAND: ${{ inputs.post-bump-command }}
      run: bash -c "$POST_BUMP_COMMAND"

    - name: Stage extra paths
      # Designed for pyproject type: stages artifact files generated by post-bump-command
      # (e.g. rebuilt web/js/* files) so they are included in the bump commit.
      # Fails on missing paths to catch typos early.
      if: inputs.version-bump-type == 'pyproject' && inputs.extra-paths-to-commit != ''
      shell: bash
      env:
        EXTRA_PATHS: ${{ inputs.extra-paths-to-commit }}
      run: |
        echo "$EXTRA_PATHS" | tr ' \t\n' '\n' | grep -v '^$' | while IFS= read -r path; do
          git add -- "$path"
        done

    - name: Commit (pyproject)
      if: inputs.version-bump-type == 'pyproject'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        git commit -m "release: v${VERSION}"

    - name: Empty commit fallback (no bump)
      if: inputs.version-bump-type == 'none'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        git commit --allow-empty -m "release: v${VERSION}"

    - name: Push release branch
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        git push --force-with-lease origin "release/v${VERSION}"

    - name: Get previous tag
      id: prev_tag
      shell: bash
      run: echo "tag=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

    - name: Build changelog
      id: changelog
      uses: mikepenz/release-changelog-builder-action@v5
      with:
        fromTag: ${{ steps.prev_tag.outputs.tag }}
        toTag: release/v${{ inputs.version }}
        configurationJson: |
          {
            "categories": [
              { "title": "## Features", "labels": ["feat"] },
              { "title": "## Bug Fixes", "labels": ["fix"] },
              { "title": "## Refactoring", "labels": ["refactor"] },
              { "title": "## Maintenance", "labels": ["chore", "ci", "docs"] }
            ],
            "sort": { "order": "ASC", "on_property": "mergedAt" },
            "template": "#{{CHANGELOG}}\n#{{UNCATEGORIZED}}",
            "pr_template": "- [##{{NUMBER}}](#{{URL}}) #{{TITLE}}",
            "empty_template": "No notable changes.",
            "label_extractor": [
              { "pattern": "^feat", "target": "feature", "on_property": "title", "method": "match" },
              { "pattern": "^fix", "target": "fix", "on_property": "title", "method": "match" },
              { "pattern": "^refactor", "target": "refactor", "on_property": "title", "method": "match" },
              { "pattern": "^chore", "target": "chore", "on_property": "title", "method": "match" },
              { "pattern": "^ci", "target": "ci", "on_property": "title", "method": "match" },
              { "pattern": "^docs", "target": "docs", "on_property": "title", "method": "match" }
            ],
            "tag_resolver": {
              "method": "semver",
              "filter": { "pattern": "v(.+)$", "flags": "g" }
            }
          }
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Ensure release label exists
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        gh label create release --color "0075ca" --force

    - name: Create or update release PR
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        VERSION: ${{ inputs.version }}
        CHANGELOG: ${{ steps.changelog.outputs.changelog }}
      run: |
        printf '%s' "${CHANGELOG}" > changelog_body.txt
        if gh pr view "release/v${VERSION}" --json number >/dev/null 2>&1; then
          gh pr edit "release/v${VERSION}" \
            --title "release: v${VERSION}" \
            --body-file changelog_body.txt \
            --add-label "release"
        else
          gh pr create \
            --base main \
            --head "release/v${VERSION}" \
            --title "release: v${VERSION}" \
            --body-file changelog_body.txt \
            --label "release"
        fi
        rm changelog_body.txt
